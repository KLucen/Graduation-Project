<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Knowledge Graph - Community Analysis</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<nav class="navbar">
  <div class="nav-container">
    <a href="/baseline" class="nav-brand">Knowledge Graph Viz</a>
    <ul class="nav-menu">
      <li><a href="/baseline">Baseline</a></li>
      <li><a href="/cognitive">Cognitive Graph</a></li>
      <li><a href="/community" class="active">Community Analysis</a></li>
      <li><a href="/rag">RAG QA</a></li>
    </ul>
  </div>
</nav>

<main class="main-content">
  <h1 class="page-title">Community Analysis</h1>
  <div class="controls">
    <div class="control-group">
      <label for="community-topic">Topic:</label>
      <select id="community-topic">
        <option value="">Select a topic</option>
      </select>
    </div>
    <div class="control-group">
      <label for="max-communities">Number of communities to show:</label>
      <input type="number" id="max-communities" value="5" min="1" max="20" step="1">
    </div>
    <button id="analyze-community" class="btn">Analyze</button>
  </div>
  <div id="community-result" class="result-area expanded"></div>
</main>

<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
